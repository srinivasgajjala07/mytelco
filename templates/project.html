<!DOCTYPE html>

<html>
<head>
<title>Customer Churn Prediction</title>
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<style>
body {
    background-color: hsl(300, 3%, 87%);
}

/* HEADER */
header{
    background-color:#0c131a;
    color:white;
    padding:15px 0;
}

header h2{
    text-align:center;
}

/* NAVIGATION */
header nav{
    text-align:center;
    margin-top:10px;
}

header nav a{
    color:red;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

/* FORM */
.form-container {
    background-color: #cfd2d2;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    padding: 20px;
    margin: 50px auto;
    width: 40%;
}

.form-group {
    margin-bottom: 20px;
}

.form-label {
    font-weight: bold;
}

.btn-predict {
    background-color: #0fb0cc;
    color: #ffffff;
    width: 100%;
}

/* FOOTER */
footer{
    background-color:#0c131a;
    color:white;
    text-align:center;
    padding:10px;
}
</style>

</head>

<body>

<!-- HEADER WITH NAVIGATION -->

<header>

<h2>Telco Customer Churn Prediction System</h2>

<nav>
<a href="/">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
<a href="exit.html">Exit</a>
</nav>

</header>

<main>

<div class="container form-container">

<h2 class="text-center mb-4">Telco-Customer Churn Prediction</h2>

<form id="churn-form" action="/predict" method="POST">

<div class="form-group">
<label class="form-label" for="tenure">Tenure:</label>
<input type="number" class="form-control" id="tenure" name="tenure" required>
</div>

<div class="form-group">
<label class="form-label" for="monthly_charges">Monthly Charges:</label>
<input type="number" class="form-control" id="monthly_charges" name="MonthlyCharges" required>
</div>

<div class="form-group">
<label class="form-label" for="total_charges">Total Charges:</label>
<input type="number" class="form-control" id="total_charges" name="TotalCharges" required>
</div>

<div class="form-group">
<label class="form-label" for="contract">Contract:</label>
<select class="form-control" id="contract" name="Contract">
<option value="0">Month-to-Month</option>
<option value="1">One Year</option>
<option value="2">Two Year</option>
</select>
</div>

<div class="form-group">
<label class="form-label" for="online_security">Online Security:</label>
<select class="form-control" id="online_security" name="OnlineSecurity">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">No internet service</option>
</select>
</div>

<div class="form-group">
<label class="form-label" for="tech_support">Tech Support:</label>
<select class="form-control" id="tech_support" name="TechSupport">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">No internet service</option>
</select>
</div>

<div class="form-group">
<label class="form-label" for="device_protection">Device Protection:</label>
<select class="form-control" id="device_protection" name="DeviceProtection">
<option value="0">No</option>
<option value="1">Yes</option>
<option value="2">No internet service</option>
</select>
</div>

<div class="form-group">
<label class="form-label" for="internet_service">Internet Service:</label>
<select class="form-control" id="internet_service" name="InternetService">
<option value="1">DSL</option>
<option value="2">Fiber Optic</option>
<option value="0">No</option>
</select>
</div>

<input type="submit" class="btn btn-predict" value="Predict">

</form>

</div>

</main>

<!-- FOOTER -->

<footer>

<p>© 2023 Telco Customer Churn Prediction </p>

</footer>

</body>
</html>
